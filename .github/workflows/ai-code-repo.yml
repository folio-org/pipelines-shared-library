# =====================================================================
# AI Code Review — for folio-org repositories
# =====================================================================
# Copy this file into your repo at:
#   .github/workflows/ai-code-review-repo.yml
#
# The actual review logic lives in the reusable workflow at
# folio-org/folio-ai-agents — updates there roll out to all repos
# automatically. No per-repo maintenance needed.
#
# Pin to a specific version (e.g. @v1) if you want to control
# when updates are picked up.
#
# Important: Pass PR metadata explicitly via `with:` — GitHub Actions
# does not provide event context to reusable workflows.
# =====================================================================

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number
      review_type:
        description: "Review type"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - comment

jobs:
  review:
    # Pin to @main to always get the latest, or use a tag like @v1
    # for stable versioning.
    uses: folio-org/folio-ai-agents/.github/workflows/ai-code-review.yml@main
    with:
      pr_number: ${{ github.event.inputs.pr_number || github.event.issue.number || github.event.pull_request.number }}
      owner: ${{ github.event.repository.owner.login }}
      repo: ${{ github.event.repository.name }}
    secrets:
      ai_pr_reviewer: ${{ secrets.AI_PR_REVIEWER }}
      gh_token: ${{ secrets.AI_PR_REVIEWER }}
